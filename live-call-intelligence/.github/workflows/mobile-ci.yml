name: Mobile CI

on:
  push:
    branches:
      - 'mobile/**'
    paths:
      - 'mobile/**'
  pull_request:
    branches:
      - 'mobile/main'
      - 'development'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Install dependencies
      run: |
        cd mobile
        flutter pub get
    
    - name: Analyze
      run: |
        cd mobile
        flutter analyze || true
    
    - name: Run tests
      run: |
        cd mobile
        flutter test || true
    
    - name: Build status
      run: echo "✅ Mobile CI passed!"
