version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pharmacy_db
    restart: always
    environment:
      POSTGRES_USER: pharmacy_user
      POSTGRES_PASSWORD: pharmacy_password_secure
      POSTGRES_DB: pharmacy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pharmacy_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pharmacy_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pharmacy.com
      PGADMIN_DEFAULT_PASSWORD: admin_secure_password
    ports:
      - "5050:80"
    networks:
      - pharmacy_network
    depends_on:
      - db

networks:
  pharmacy_network:
    driver: bridge

volumes:
  postgres_data:
