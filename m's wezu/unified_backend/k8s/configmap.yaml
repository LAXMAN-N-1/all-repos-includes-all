apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  ENVIRONMENT: "production"
  DATABASE_URL: "postgresql://wezu_user:pass@db-service:5432/wezu_db"
  REDIS_URL: "redis://redis-service:6379/0"
  MQTT_BROKER_URL: "mqtt://mqtt-service:1883"
  PROJECT_NAME: "WEZU Energy"
  API_V1_STR: "/api/v1"
  AUTH_PROVIDER: "supabase"
  SUPABASE_URL: "https://YOUR_PROJECT_REF.supabase.co"
  SUPABASE_JWKS_URL: "https://YOUR_PROJECT_REF.supabase.co/auth/v1/.well-known/jwks.json"
  SUPABASE_JWT_ISSUER: "https://YOUR_PROJECT_REF.supabase.co/auth/v1"
  SUPABASE_JWT_AUDIENCE: "authenticated"
  SUPABASE_ALLOWED_ALGORITHMS: "ES256,RS256"
