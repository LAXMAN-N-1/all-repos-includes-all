name: ls_flutter_kit
description: >
  A premium, production-grade Flutter UI kit with glassmorphism widgets,
  responsive utilities, Dio-based networking, secure auth flow, and
  reusable components extracted from 15+ real-world applications.
version: 1.0.0
homepage: https://github.com/LAXMAN-N-1/flutter_ui_kit

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Networking ---
  dio: ^5.4.0
  connectivity_plus: ^6.0.0

  # --- State Management ---
  flutter_riverpod: ^2.5.0

  # --- Routing ---
  go_router: ^14.0.0

  # --- Storage ---
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # --- UI ---
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.0
  lucide_icons: ^0.257.0
  fl_chart: ^0.68.0

  # --- Utilities ---
  intl: ^0.19.0
  url_launcher: ^6.2.0
  path_provider: ^2.1.0
  image_picker: ^1.2.1
  flutter_slidable: ^4.0.3
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
