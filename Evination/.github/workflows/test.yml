name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: evination_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --force-reinstall -r requirements-test.txt
      
      - name: Wait for MySQL
        run: |
          while ! mysqladmin ping -h"127.0.0.1" --silent; do
            sleep 1
          done
          
      - name: Run integration tests
        env:
          TEST_DATABASE_URL: mysql+pymysql://root:testpassword@127.0.0.1:3306/evination_test
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: mysql+pymysql://root:testpassword@127.0.0.1:3306/evination_test
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml
        
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
          
      - name: Test Summary
        uses: test-summary/action@v2
        if: always()
        with:
          paths: test-results.xml
